# Use Neon (or any external Postgres) instead of the bundled postgres container.
#
# Requires DATABASE_URL in repo-root `.env` (Neon connection string).
# Redis still runs locally in Docker for Celery / rate limits.
#
#   docker compose -f docker-compose.yml -f docker-compose.neon.yml up -d
#
# Migrations and admin (use the same DATABASE_URL from `.env`):
#   npm run db:migrate
#   npm run db:create-admin

services:
  api:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: !override
      redis:
        condition: service_healthy

  worker:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: !override
      redis:
        condition: service_healthy

  postgres:
    profiles:
      - local-db
