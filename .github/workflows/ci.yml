name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx aiosqlite pytest-mock
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy . --ignore-missing-imports
      - name: Unit tests
        run: pytest tests/unit/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-do-not-use-in-production-32chars
          ENVIRONMENT: test
      - name: Integration tests
        run: pytest tests/integration/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-do-not-use-in-production-32chars
          ENVIRONMENT: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway staging
        run: echo "Configure railway up --environment staging when RAILWAY_TOKEN is set"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.mindflip.io
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway production
        run: echo "Configure railway up --environment production when RAILWAY_TOKEN is set"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
